name: AutoService CI Pipeline

on:
  pull_request:
    branches:
      - dev

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Клонирование репозитория
        uses: actions/checkout@v4

      - name: Установка Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Обновление pip
        run: python -m pip install --upgrade pip

      - name: Проверка версии Python
        run: python --version

      - name: Проверка структуры проекта
        run: |
          echo "Проверка проекта автосервиса выполнена успешно"