version: "3.9"

services:
  main-api:
    build: ./backend
    container_name: autoservice-main-api
    ports:
      - "8000:8000"

  notification-service:
    build: ./microservices/notification-service
    container_name: autoservice-notification-service
    ports:
      - "8001:8001"
    depends_on:
      - main-api

  analytics-service:
    build: ./microservices/analytics-service
    container_name: autoservice-analytics-service
    ports:
      - "8002:8002"
    depends_on:
      - main-api
