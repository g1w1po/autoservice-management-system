version: "3.9"

services:
  main-api:
    build: ./backend
    image: autoservice-main-api:latest
    ports:
      - "8000:8000"

  notification-service:
    build: ./microservices/notification-service
    image: autoservice-notification-service:latest
    ports:
      - "8001:8001"
    depends_on:
      - main-api

  analytics-service:
    build: ./microservices/analytics-service
    image: autoservice-analytics-service:latest
    ports:
      - "8002:8002"
    depends_on:
      - main-api

  nginx:
    image: nginx:latest
    container_name: autoservice-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - main-api
      - notification-service
      - analytics-service
