version: "3.9"

services:
  main-api:
    image: autoservice-main-api:latest
    ports:
      - "8000:8000"
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure

  notification-service:
    image: autoservice-notification-service:latest
    ports:
      - "8001:8001"
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure

  analytics-service:
    image: autoservice-analytics-service:latest
    ports:
      - "8002:8002"
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    configs:
      - source: nginx_config
        target: /etc/nginx/nginx.conf
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

configs:
  nginx_config:
    file: ./nginx/nginx.conf